{% extends 'base.html' %}


{% block body %}
<div class="container mt-5">
   
    <h1 class="display-4 text-center mb-4 text-warning text-shadow">Artists</h1>
    
    <div class="row">
        {% for artist in artists %}
        <div class="col-md-4 mb-4">
            <div class="card text-center shadow-lg transform-card">
                {% if artist.image %}
                    <a href="{% url 'artist_detail' artist.id %}">
                        <img src="{{ artist.image.url }}" alt="{{ artist.name }}" class="card-img-top artist-image hover-shadow">
                    </a>
                {% endif %}
                <div class="card-body bg-dark text-white">
                    <h5  style="color:  #ffd700;;" ;>{{ artist.name }}</h5>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>


    <div class="text-center mt-4">
        <a href="{% url 'home' %}" class="btn btn-warning btn-lg shadow-lg hover-shadow">Return HOME</a>
    </div>
</div>


<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
   
    body {
        font-family: 'Arial', sans-serif;
        background-color: #121212; 
        color: #e0e0e0; 
       
        padding: 10px;
    }

    .text-shadow {
        text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.7); 
    }

    h1 {
        font-weight: bold;
        letter-spacing: 20px;
        
    }

    
    .artist-image {
        width: 300px;

        object-fit: cover; 
        
        max-height: 300px; 
        
    }

    .artist-image:hover {
        transform: scale(1.5); 
    
        height: auto;
    }

    .card {
     
        transition: transform 2s, box-shadow 3s ease-in-out; 
        border-radius: 15px;
    }

    .card:hover {
        transform: scale(1.05); 
        
    }

  
    .card-body {
     
            border-radius: 0 0 15px 15px; }

    .card-title {
        font-weight: bold;
     
    }

   
    .hover-shadow:hover {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); 
    }

     {
        background-color: #ff6347; : #ff6347;
        padding: 15px 30px;
        font-size: 18px;
        text-transform: uppercase;
    }

    .btn-warning:hover {
        background-color: #ff4500; 
        border-color: #ff4500;
    }

   
    .container {
        max-width: 1200px;
    }

    @media (max-width: 767px) {
        .container {
            padding: 10px;
        }

        .card {
            margin-bottom: 20px;
        }

        .artist-image {
            height: 250px; 
        }

        h1 {
            font-size: 1.8rem; 
        }
    }
</style>

{% endblock %}
