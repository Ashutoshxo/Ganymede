{% load static %}
<nav class="navbar navbar-expand-lg sticky-top" style="background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); padding: 15px 0;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}" style="font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: 2px;">
            <img src="{% static 'image/moon.png' %}" alt="Logo" style="width: 35px; height: 35px; margin-right: 12px; filter: drop-shadow(0 0 5px var(--primary));">
            <span class="text-gradient">GANYMEDE</span>
        </a>
        
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="fas fa-bars text-white"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 align-items-center gap-lg-4">
                <li class="nav-item">
                    <a class="nav-link text-white fw-light hover-accent" href="{% url 'home' %}">HOME</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white fw-light hover-accent" href="{% url 'library' %}">LIBRARY</a>
                </li>
                {% if user.is_authenticated %}
                <li class="nav-item dropdown">
                    <a class="nav-link text-white d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
                        {% if user.profile_picture %}
                            <img src="{{ user.profile_picture.url }}" class="rounded-circle border border-secondary" style="width: 30px; height: 30px; object-fit: cover;">
                        {% else %}
                            <i class="fas fa-user-circle fs-4"></i>
                        {% endif %}
                        <span class="fw-semibold">{{ user.username|upper }}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark border-secondary glass-dropdown">
                        <li><a class="dropdown-item" href="{% url 'user_profile' %}">Profile</a></li>
                        <li><a class="dropdown-item" href="{% url 'user_dashboard' %}">Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Logout</a></li>
                    </ul>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link text-white fw-light" href="{% url 'login' %}">LOGIN</a>
                </li>
                <li class="nav-item">
                    <a class="btn-premium py-1 px-4" href="{% url 'register' %}" style="font-size: 0.9rem;">SIGN UP</a>
                </li>
                {% endif %}
            </ul>
            
            <form class="d-flex position-relative mt-3 mt-lg-0" role="search" method="GET" action="{% url 'search' %}">
                <input class="form-control rounded-pill border-secondary bg-dark text-white pe-5" 
                       type="search" name="q" placeholder="Search artists, songs..." 
                       style="min-width: 250px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important;">
                <button class="btn position-absolute end-0 top-50 translate-middle-y border-0 text-white opacity-75" type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>
    </div>
</nav>

<style>
    .hover-accent {
        transition: color 0.3s ease, transform 0.3s ease;
    }
    .hover-accent:hover {
        color: var(--primary) !important;
        transform: translateY(-2px);
    }
    .glass-dropdown {
        background: rgba(20, 20, 22, 0.95) !important;
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
    }
</style>
