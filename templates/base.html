{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganymede - Celestial Sounds</title>

    <!-- CSS (Absolute paths for Edge/Chrome compatibility) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v=1.2">

    <!-- HTMX Loaded in Head -->
    <script src="https://unpkg.com/htmx.org@1.9.10" crossorigin="anonymous"></script>
</head>
<body class="bg-dark text-white" hx-boost="true">
    
    <!-- This ID is crucial for HTMX swapping -->
    <div id="page-content">
        {% include "navbar.html" %}

        <main id="main-area" style="min-height: 85vh; padding-bottom: 120px;">
            {% block body %}
            {% endblock %}
        </main>

        {% include 'footer.html' %}
    </div>

    <!-- GLOBAL PLAYER (OUTSIDE OF EVERYTHING, PROTECTED BY HX-PRESERVE) -->
    <div id="global-player" hx-preserve="true" class="fixed-bottom glass-card mx-2 mb-2 p-2 shadow-lg" style="z-index: 9999; border-radius: 20px;">
        <div class="container-fluid">
            <div class="row align-items-center">
                <!-- Song Info -->
                <div class="col-4 col-md-3 d-flex align-items-center gap-3">
                    <img id="player-img" src="/static/image/moon.png" class="rounded shadow-sm" style="width: 55px; height: 55px; object-fit: cover;">
                    <div class="overflow-hidden d-none d-sm-block">
                        <h6 id="player-title" class="mb-0 text-truncate fw-bold">Select a song</h6>
                        <small id="player-artist" class="text-muted text-truncate d-block">Ganymede Music</small>
                    </div>
                </div>
                
                <!-- Controls -->
                <div class="col-4 col-md-6 text-center">
                    <div class="d-flex justify-content-center align-items-center gap-4 mb-1">
                        <button class="btn btn-link text-white p-0"><i class="fas fa-step-backward"></i></button>
                        <button id="player-play-btn" onclick="toggleGlobalPlay()" class="btn-premium rounded-circle d-flex align-items-center justify-content-center p-0 shadow" style="width: 45px; height: 45px; background: white; border: none;">
                            <i id="play-icon" class="fas fa-play text-dark"></i>
                        </button>
                        <button class="btn btn-link text-white p-0"><i class="fas fa-step-forward"></i></button>
                    </div>
                    <div class="d-flex align-items-center gap-2 px-md-5">
                        <small id="player-current-time" class="text-muted" style="font-size: 0.75rem;">0:00</small>
                        <div class="progress flex-grow-1" style="height: 4px; background: rgba(255,255,255,0.1); cursor: pointer;" onclick="seekAudio(event)">
                            <div id="player-progress-bar" class="progress-bar bg-primary" role="progressbar" style="width: 0%;"></div>
                        </div>
                        <small id="player-duration" class="text-muted" style="font-size: 0.75rem;">0:00</small>
                    </div>
                </div>
                
                <!-- Extra -->
                <div class="col-4 col-md-3 d-flex justify-content-end align-items-center gap-3">
                    <div class="d-flex align-items-center gap-2 d-none d-md-flex">
                        <i class="fas fa-volume-up text-muted"></i>
                        <input type="range" id="player-volume" oninput="changeVolume(this.value)" class="form-range" style="width: 80px;" min="0" max="100" value="80">
                    </div>
                </div>
            </div>
        </div>
        <audio id="main-audio-element" preload="auto"></audio>
    </div>

    <!-- PERSISTENT SCRIPTS -->
    <script>
        // Ensure audio reference is global and persistent
        if (!window.audioInstance) {
            window.audioInstance = document.getElementById('main-audio-element');
        }
        const audio = window.audioInstance;

        function updatePlayBtn() {
            const icon = document.getElementById('play-icon');
            if (icon) {
                icon.className = audio.paused ? 'fas fa-play text-dark' : 'fas fa-pause text-dark';
            }
        }

        window.playSong = function(url, title, artist, img) {
            if (!audio.src.includes(url)) {
                audio.src = url;
                document.getElementById('player-title').innerText = title;
                document.getElementById('player-artist').innerText = artist;
                document.getElementById('player-img').src = img;
                audio.play();
            } else {
                toggleGlobalPlay();
            }
            updatePlayBtn();
        };

        function toggleGlobalPlay() {
            if (audio.src) {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
                updatePlayBtn();
            }
        }

        function seekAudio(e) {
            if (audio.duration) {
                const percent = e.offsetX / e.currentTarget.offsetWidth;
                audio.currentTime = percent * audio.duration;
            }
        }

        function changeVolume(val) { audio.volume = val / 100; }

        audio.addEventListener('timeupdate', () => {
            const bar = document.getElementById('player-progress-bar');
            if (bar) {
                const percent = (audio.currentTime / audio.duration) * 100;
                bar.style.width = percent + '%';
                const fmt = (t) => Math.floor(t/60) + ":" + ("0"+Math.floor(t%60)).slice(-2);
                document.getElementById('player-current-time').innerText = fmt(audio.currentTime);
                document.getElementById('player-duration').innerText = fmt(audio.duration || 0);
            }
        });

        audio.addEventListener('play', updatePlayBtn);
        audio.addEventListener('pause', updatePlayBtn);

        // BOOTSTRAP RE-INIT (Fixes Profile Dropdowns after HTMX Swaps)
        document.body.addEventListener('htmx:afterSwap', function() {
            var dropdownElementList = [].slice.call(document.querySelectorAll('[data-bs-toggle="dropdown"]'))
            dropdownElementList.map(function (dropdownToggleEl) {
                return new bootstrap.Dropdown(dropdownToggleEl)
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
